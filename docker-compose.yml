services:
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      SECRET_KEY: ${SECRET_KEY:-change-me-before-deploying}
    volumes:
      - ./data:/data
    ports:
      - "8000:8000"
    networks:
      - budget

  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - budget

networks:
  budget:
    external: true
    name: budget

